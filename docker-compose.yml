services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: melodia
      POSTGRES_PASSWORD: melodia
      POSTGRES_DB: melodia
    ports:
      - "5432:5432"
    volumes:
      - melodia_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U melodia -d melodia"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://melodia:melodia@db:5432/melodia
      JWT_SECRET_KEY: dev-secret-change-in-prod
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ""
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  melodia_pg: {}
