# Single command to start the whole stack:
#
#     docker compose up --build
#
# Then open the app at http://localhost:8080
#   - Frontend (nginx + SPA) ............ http://localhost:8080
#   - Backend API (FastAPI) ............. http://localhost:8000
#   - Backend Swagger UI ................ http://localhost:8000/docs
#   - PostgreSQL ........................ localhost:5432  (user/pwd/db: melodia)
#
# The frontend container proxies /api and /health to the backend, so the SPA
# stays same-origin (no CORS configuration needed in browsers).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: melodia
      POSTGRES_PASSWORD: melodia
      POSTGRES_DB: melodia
    ports:
      - "5432:5432"
    volumes:
      - melodia_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U melodia -d melodia"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://melodia_user:eTgyHxeRJlBw4Kw3yISwD4xUGdB0d1hv@dpg-d7vqmqb7uimc73f0fi0g-a.frankfurt-postgres.render.com/melodia
      JWT_SECRET_KEY: MELODIA@2026##
      # Allow the SPA on port 8080 *and* direct browser hits on 8000 / Vite dev on 5173.
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:8000,http://127.0.0.1:8000,http://localhost:5173,http://127.0.0.1:5173,https://melodia-flame.vercel.app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./melodia-frontend
      args:
        # Empty = same-origin; nginx in this container proxies /api to the backend.
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  melodia_pg: {}
